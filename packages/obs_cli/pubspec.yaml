name: obs_cli
version: 5.2.3+2
description: A CLI tool and MCP server for controlling OBS Studio via the obs-websocket protocol.
homepage: https://github.com/cdavis-code/obs_websocket
repository: https://github.com/cdavis-code/obs_websocket/tree/main/packages/obs_cli
issue_tracker: https://github.com/cdavis-code/obs_websocket/issues
documentation: https://pub.dev/documentation/obs_cli/latest/
funding:
  - https://buymeacoffee.com/cdavis
topics:
  - obs-websocket
  - obs-studio
  - streaming
  - broadcasting
  - cli

resolution: workspace

environment:
  sdk: ^3.8.0

executables:
  obs: obs

dependencies:
  obs_websocket: ^5.2.3+2
  args: ^2.7.0
  loggy: ^2.0.3
  universal_io: ^2.2.2
  uuid: ^4.5.1
  yaml: ^3.1.3
  dart_mcp: ^0.5.1
  easy_api_annotations: ^0.6.0

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.14
