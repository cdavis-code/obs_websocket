name: obs_websocket
version: 5.7.0
description: An OBS WebSocket client written in Dart. obs_websocket allows Dart-based connections to the OBS (Open Broadcaster Software) plugin obs-websocket.
repository: https://github.com/cdavis-code/obs_websocket

resolution: workspace

environment:
  sdk: ^3.8.0

dependencies:
  crypto: ^3.0.6
  envied: ^1.1.1
  json_annotation: ^4.11.0
  loggy: ^2.0.3
  universal_io: ^2.2.2
  uuid: ^4.5.1
  validators: ^3.0.0
  web_socket_channel: ^3.0.2
  yaml: ^3.1.3

dev_dependencies:
  build_runner: ^2.10.1
  envied_generator: ^1.1.1
  json_serializable: ^6.13.2
  lints: ^6.0.0
  test: ^1.25.14
