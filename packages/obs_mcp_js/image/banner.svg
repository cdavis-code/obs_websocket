<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f7df1e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#68a063;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="js-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7df1e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0db4f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="node-green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#68a063;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3c873a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.1">
    <line x1="0" y1="0" x2="1280" y2="640" stroke="white" stroke-width="1"/>
    <line x1="1280" y1="0" x2="0" y2="640" stroke="white" stroke-width="1"/>
    <line x1="640" y1="0" x2="640" y2="640" stroke="white" stroke-width="1"/>
    <line x1="0" y1="320" x2="1280" y2="320" stroke="white" stroke-width="1"/>
  </g>
  
  <!-- OBS-style camera icon with JS styling -->
  <g transform="translate(540, 100)" filter="url(#glow)">
    <rect x="0" y="30" width="200" height="120" rx="20" fill="url(#accent)"/>
    <polygon points="200,60 260,30 260,150 200,120" fill="url(#accent)"/>
    <circle cx="100" cy="90" r="35" fill="white" opacity="0.9"/>
    <circle cx="100" cy="90" r="20" fill="url(#bg)"/>
    <!-- JS badge on camera -->
    <rect x="140" y="100" width="40" height="40" rx="4" fill="#f7df1e"/>
    <text x="160" y="132" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#323330" text-anchor="middle">JS</text>
  </g>
  
  <!-- Connection nodes -->
  <g opacity="0.6">
    <circle cx="200" cy="200" r="8" fill="#f7df1e"/>
    <circle cx="1080" cy="200" r="8" fill="#68a063"/>
    <circle cx="200" cy="440" r="8" fill="#68a063"/>
    <circle cx="1080" cy="440" r="8" fill="#f7df1e"/>
    <line x1="200" y1="200" x2="540" y2="160" stroke="#f7df1e" stroke-width="2" opacity="0.5"/>
    <line x1="1080" y1="200" x2="800" y2="160" stroke="#68a063" stroke-width="2" opacity="0.5"/>
    <line x1="200" y1="440" x2="540" y2="260" stroke="#68a063" stroke-width="2" opacity="0.5"/>
    <line x1="1080" y1="440" x2="800" y2="260" stroke="#f7df1e" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- Title -->
  <text x="640" y="360" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="white" text-anchor="middle">
    @unngh/obs-mcp
  </text>
  
  <!-- Subtitle -->
  <text x="640" y="415" font-family="Arial, sans-serif" font-size="24" fill="#f7df1e" text-anchor="middle">
    MCP Server for OBS Studio • Node.js • WebSocket v5.x
  </text>
  
  <!-- npm badge -->
  <g transform="translate(420, 460)">
    <rect x="0" y="0" width="80" height="28" rx="14" fill="#cb3837"/>
    <text x="40" y="19" font-family="Arial, sans-serif" font-size="13" fill="white" text-anchor="middle">npm</text>
  </g>
  
  <!-- Node.js >= 18 badge -->
  <g transform="translate(520, 460)">
    <rect x="0" y="0" width="120" height="28" rx="14" fill="#3c873a"/>
    <text x="60" y="19" font-family="Arial, sans-serif" font-size="13" fill="white" text-anchor="middle">Node.js ≥ 18</text>
  </g>
  
  <!-- MCP protocol badge -->
  <g transform="translate(660, 460)">
    <rect x="0" y="0" width="110" height="28" rx="14" fill="#f7df1e"/>
    <text x="55" y="19" font-family="Arial, sans-serif" font-size="13" fill="#323330" text-anchor="middle">MCP Protocol</text>
  </g>
  
  <!-- WebSocket badge -->
  <g transform="translate(790, 460)">
    <rect x="0" y="0" width="110" height="28" rx="14" fill="#0f3460"/>
    <text x="55" y="19" font-family="Arial, sans-serif" font-size="13" fill="white" text-anchor="middle">WebSocket v5</text>
  </g>
  
  <!-- Feature icons at bottom -->
  <g transform="translate(200, 560)" opacity="0.7">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="16" fill="#a0a0a0" text-anchor="middle">🎬 Scenes</text>
    <text x="180" y="0" font-family="Arial, sans-serif" font-size="16" fill="#a0a0a0" text-anchor="middle">📡 Streaming</text>
    <text x="360" y="0" font-family="Arial, sans-serif" font-size="16" fill="#a0a0a0" text-anchor="middle">🔴 Recording</text>
    <text x="540" y="0" font-family="Arial, sans-serif" font-size="16" fill="#a0a0a0" text-anchor="middle">🎛️ Filters</text>
    <text x="720" y="0" font-family="Arial, sans-serif" font-size="16" fill="#a0a0a0" text-anchor="middle">🎥 Sources</text>
    <text x="880" y="0" font-family="Arial, sans-serif" font-size="16" fill="#a0a0a0" text-anchor="middle">⚡ 60+ Tools</text>
  </g>
</svg>
